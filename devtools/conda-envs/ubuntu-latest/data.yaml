name: data
channels:
  - openeye
  - conda-forge
dependencies:
  # Base
  - pip
  - python >=3.12,<3.13

  # Testing
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-timeout
  - pytest-console-scripts
  - codecov
  - requests-mock
  - mock

  # Core
  - click
  - appdirs
  - pydantic >2
  - pydantic-settings
  - numpy
  - pandas
  - pebble
  - rdkit
  - openff-toolkit
  - openff-fragmenter
  - openff-forcefields >=2024.04.0
  - openeye-toolkits
  - multimethod
  - scipy >=1.13.1
  - gufe =1.7.1

  # Data services
  - pooch
  - requests
  - boto3
  - moto
  - flask
  - flask-cors
  - typing-extensions
  - biopython
  - validators
  - pyyaml
  - ase
  - sigfig

  # Execution
  - dask
  - distributed
#  - dask-jobqueue
  - netifaces

  # Sequence alignment
  - mafft
