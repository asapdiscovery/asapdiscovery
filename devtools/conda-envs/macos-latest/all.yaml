name: asapdiscovery
channels:
  - openeye
  - conda-forge
dependencies:
  # Base
  - pip
  - python >=3.12,<3.13

  # Testing
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-timeout
  - pytest-console-scripts
  - codecov
  - requests-mock
  - mock

  # Core
  - click
  - appdirs
  - pydantic >2
  - pydantic-settings
  - numpy
  - pandas
  - pebble
  - rdkit
  - openff-toolkit =0.18.0
  - openff-interchange =0.4.11
  - openff-fragmenter
  - openff-forcefields >=2024.04.0
  - openeye-toolkits
  - multimethod
  - scipy >=1.13.1

  # Data services
  - requests
  - boto3
  - moto
  - flask
  - flask-cors
  - typing-extensions
  - biopython
  - validators
  - pyyaml
  - ase
  - sigfig

  # Execution
  - dask
  - distributed
#  - dask-jobqueue
  - netifaces

  # ML
  - pytorch
  - pytorch_geometric >=2.5.0
  - pytorch_cluster
  - pytorch_scatter
  - pytorch_sparse
  - h5py
  - e3nn
  - dgl <=2.0.0
  - dgllife
  - pooch
  - mtenn =0.6.3
  - wandb

  # Simulation / MD
  - openmm =8.2.0
  - openmmtools
  - openmmforcefields =0.15.1
  - mdtraj

  # Docking
  - mdanalysis

  # Alchemy / Free energy
  - openfe =1.8.0
  - gufe =1.7.1
  - httpx
  - perses >=0.10.2
  - kartograf
  - rich
  - alchemiscale-client >=0.7.2
  - feflow =0.2.0
  - cinnabar >=0.4.1

  # Visualization
  - seaborn
  - panel
  - plotmol
  - semver
  - imageio
  - pymol-open-source
  - gifsicle
  - plip
  - plotly
  - dash
  - pygifsicle
  - airium
  - logomaker

  - pip:
    - git+https://github.com/OpenFreeEnergy/alchemiscale-fah.git@v0.3.1
