name: alchemy
channels:
  - openeye
  - conda-forge
dependencies:
  # Base
  - pip
  - python >=3.12,<3.13

  # Testing
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-timeout
  - pytest-console-scripts
  - codecov
  - requests-mock
  - mock
  - pooch

  # Core
  - click
  - appdirs
  - pydantic >2
  - pydantic-settings
  - numpy
  - pandas
  - pebble
  - rdkit
  - openff-toolkit
  - openff-forcefields >=2024.04.0
  - openeye-toolkits
  - multimethod

  # Data services
  - requests
  - boto3
  - moto
  - flask
  - flask-cors
  - typing-extensions
  - biopython
  - validators
  - pyyaml
  - ase
  - sigfig

  # Execution
  - dask
  - distributed
#  - dask-jobqueue
  - netifaces

  # Alchemy / Free energy
  - openfe >=1.8.0
  - gufe >=1.7.2
  - openmm
  - openmmforcefields >= 0.13.0
  - mdtraj
  - httpx
  - perses >=0.10.2
  - kartograf
  - rich
  - alchemiscale-client >=0.7.2
  - cinnabar >=0.4.1
  - seaborn
  - panel
  - plotmol
  - semver
