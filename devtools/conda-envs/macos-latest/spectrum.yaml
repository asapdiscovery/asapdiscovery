name: spectrum
channels:
  - openeye
  - conda-forge
dependencies:
  # Base
  - pip
  - python >=3.12,<3.13

  # Testing
  - pytest
  - pytest-cov
  - pytest-xdist
  - pytest-timeout
  - pytest-console-scripts
  - codecov
  - requests-mock
  - mock
  - pooch

  # Core
  - click
  - appdirs
  - pydantic >2
  - pydantic-settings
  - numpy
  - pandas
  - pebble
  - rdkit
  - openff-toolkit
  - openff-forcefields >=2024.04.0
  - openeye-toolkits
  - multimethod
  - gufe >=1.7.2

  # Data services
  - requests
  - boto3
  - moto
  - flask
  - flask-cors
  - typing-extensions
  - biopython
  - validators
  - pyyaml
  - ase
  - sigfig

  # Execution
  - dask
  - distributed
  - dask-jobqueue
  - netifaces

  # Spectrum
  # Note: bokeh is a transitive dep of panel; included here for spectrum's plotting
  - bokeh
  - plip
